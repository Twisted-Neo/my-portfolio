<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT_OPERATOR | Uplink Established</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="crt-effects"></div>

    <header>
        <div class="logo">
            <img src="assets/icons/icon.webp" alt="Logo">
            <span class="highlight">NODE</span>_EXPLORER
        </div>
        <nav>
            <ul>
                <li><a href="index.html" class="nav-link">HEM</a></li>
                <li><a href="about.html" class="nav-link">OM MIG</a></li>
                <li><a href="projects.html" class="nav-link">PROJEKT</a></li>
                <li><a href="gallery.html" class="nav-link">BILDER</a></li>
                <li><a href="contact.html" class="nav-link active">KONTAKT</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contact-terminal">
            <h2 class="section-title">ESTABLISH_COMM_LINK</h2>
            
            <div class="contact-grid">
                <div class="connection-status">
                    <div class="status-box">
                        <div class="signal-bar">
                            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                        </div>
                        <span>SIGNAL_STRENGTH: STRONG</span>
                    </div>

                    <div class="social-directory">
                        <h3>> DIRECTORY</h3>
                        <div class="directory-item">
                            <span class="label">DISCORD:</span>
                            <span class="value neon-blue">neo_swe | TwistedNeo</span>
                        </div>
                        <div class="directory-item">
                            <span class="label">LOCATION:</span>
                            <span class="value">SWEDEN</span>
                        </div>
                        <div class="directory-item">
                            <span class="label">ENCRYPTION:</span>
                            <span class="value">AES-256</span>
                        </div>
                    </div>
                </div>

                <div class="form-container">
                    <form id="uplink-form">
                        <div class="input-group">
                            <label for="name">IDENT_NAME</label>
                            <input type="text" id="name" name="name" placeholder="Enter identification..." required>
                        </div>

                        <div class="input-group">
                            <label for="email">UPLINK_EMAIL</label>
                            <input type="email" id="email" name="email" placeholder="user@network.com" required>
                        </div>

                        <div class="input-group">
                            <label for="message">TRANSMISSION_DATA</label>
                            <textarea id="message" name="message" rows="5" placeholder="Type your message here..." required></textarea>
                        </div>

                        <button type="submit" class="submit-btn">
                            <span class="btn-text">SEND_TRANSMISSION</span>
                        </button>
                    </form>
                    <div id="form-feedback" class="form-feedback hidden"></div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-container">
            <div class="social-nodes">
                <a href="https://twsitedneo.carrd.co/" class="node-link">CARD</a>
                <a href="#" class="node-link">DISCORD</a>
            </div>
            <div class="terminal-footer">
                <p>UPLINK_READY // (C) 2026</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
